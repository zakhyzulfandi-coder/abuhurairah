<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f27a24" />
  <meta name="description" content="SISFO AHIS MTS - Web App PWA" />

  <title>SISFO AHIS MTS</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png" />

  <style>
    :root {
      --brand: #f27a24;
      --brand-soft: #fff4ec;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --shadow: 0 18px 45px rgba(15, 23, 42, .12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(242, 122, 36, .12), transparent 34%),
        linear-gradient(180deg, #f8fafc 0%, #eef4f8 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    body {
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    .app-shell {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: #f8fafc;
    }

    .app-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(242, 122, 36, .18), transparent 36%),
        linear-gradient(180deg, #fff7ed 0%, #f8fafc 100%);
      transition: opacity .35s ease, visibility .35s ease;
    }

    .splash.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-card {
      width: min(420px, 94vw);
      padding: 28px 24px;
      border-radius: 28px;
      background: rgba(255, 255, 255, .84);
      border: 1px solid rgba(226, 232, 240, .88);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(16px);
    }

    .logo-box {
      width: 74px;
      height: 74px;
      border-radius: 24px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--brand), #ffb84d);
      box-shadow: 0 18px 34px rgba(242, 122, 36, .28);
    }

    .splash-title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: -.02em;
    }

    .splash-sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: .92rem;
      font-weight: 650;
      line-height: 1.45;
    }

    .loader {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 4px solid #fed7aa;
      border-top-color: var(--brand);
      animation: spin .8s linear infinite;
      margin: 22px auto 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .top-alert {
      position: fixed;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      z-index: 80;
      width: min(560px, calc(100vw - 24px));
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(15, 23, 42, .94);
      color: #ffffff;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      font-size: .9rem;
      font-weight: 700;
    }

    .top-alert.show {
      display: flex;
    }

    .top-alert button {
      border: 0;
      border-radius: 12px;
      padding: 8px 12px;
      background: var(--brand);
      color: #ffffff;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .install-box {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 70;
      display: none;
      max-width: min(360px, calc(100vw - 28px));
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(226, 232, 240, .9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .install-box.show {
      display: block;
    }

    .install-title {
      margin: 0 0 4px;
      font-size: .98rem;
      font-weight: 900;
    }

    .install-text {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: .84rem;
      font-weight: 650;
      line-height: 1.45;
    }

    .install-actions {
      display: flex;
      gap: 8px;
    }

    .install-actions button {
      border: 0;
      border-radius: 13px;
      padding: 9px 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn-install {
      background: linear-gradient(135deg, var(--brand), #ff9f3d);
      color: #ffffff;
      flex: 1;
    }

    .btn-close {
      background: #f1f5f9;
      color: var(--ink);
    }

    @media (display-mode: standalone) {
      .install-box {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <iframe
      id="appFrame"
      class="app-frame"
      title="SISFO AHIS MTS"
      src="https://script.google.com/a/~/macros/s/AKfycbytGPvOxJSwIR7tsbPwq2CsgXCvRBOUnU0SbE3acmPjRQs8EIyRa2gYQhjamzwHCAGy/exec">
    </iframe>
  </div>

  <div class="splash" id="splash">
    <div class="splash-card">
      <div class="logo-box">AH</div>
      <h1 class="splash-title">SISFO AHIS MTS</h1>
      <p class="splash-sub">Memuat aplikasi. Pastikan koneksi internet aktif.</p>
      <div class="loader"></div>
    </div>
  </div>

  <div class="top-alert" id="offlineAlert">
    <span>Anda sedang offline. Aplikasi membutuhkan internet untuk membuka data Apps Script.</span>
    <button type="button" onclick="location.reload()">Muat Ulang</button>
  </div>

  <div class="top-alert" id="updateAlert">
    <span>Versi aplikasi terbaru tersedia.</span>
    <button type="button" id="btnApplyUpdate">Update</button>
  </div>

  <div class="install-box" id="installBox">
    <p class="install-title">Install SISFO AHIS</p>
    <p class="install-text">Tambahkan aplikasi ke layar utama agar lebih cepat dibuka seperti aplikasi biasa.</p>
    <div class="install-actions">
      <button type="button" class="btn-install" id="btnInstall">Install</button>
      <button type="button" class="btn-close" id="btnCloseInstall">Nanti</button>
    </div>
  </div>

  <script>
    const APP_VERSION = "2026.06.18.02";
    const frame = document.getElementById("appFrame");
    const splash = document.getElementById("splash");
    const offlineAlert = document.getElementById("offlineAlert");
    const updateAlert = document.getElementById("updateAlert");
    const installBox = document.getElementById("installBox");
    const btnInstall = document.getElementById("btnInstall");
    const btnCloseInstall = document.getElementById("btnCloseInstall");
    const btnApplyUpdate = document.getElementById("btnApplyUpdate");

    let deferredPrompt = null;
    let newWorkerWaiting = null;
    let splashTimer = null;

    function hideSplash() {
      clearTimeout(splashTimer);
      splash.classList.add("hide");
    }

    function updateOnlineStatus() {
      offlineAlert.classList.toggle("show", !navigator.onLine);
    }

    window.addEventListener("online", updateOnlineStatus);
    window.addEventListener("offline", updateOnlineStatus);
    updateOnlineStatus();

    frame.addEventListener("load", function () {
      setTimeout(hideSplash, 500);
    });

    splashTimer = setTimeout(hideSplash, 9000);

    window.addEventListener("beforeinstallprompt", function (event) {
      event.preventDefault();
      deferredPrompt = event;

      const dismissedAt = Number(localStorage.getItem("pwa_install_dismissed_at") || 0);
      const oneDay = 24 * 60 * 60 * 1000;

      if (Date.now() - dismissedAt > oneDay) {
        installBox.classList.add("show");
      }
    });

    btnInstall.addEventListener("click", async function () {
      if (!deferredPrompt) return;
      installBox.classList.remove("show");
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    });

    btnCloseInstall.addEventListener("click", function () {
      localStorage.setItem("pwa_install_dismissed_at", String(Date.now()));
      installBox.classList.remove("show");
    });

    window.addEventListener("appinstalled", function () {
      deferredPrompt = null;
      installBox.classList.remove("show");
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async function () {
        try {
          const reg = await navigator.serviceWorker.register("./sw.js?v=" + APP_VERSION);

          if (reg.waiting) {
            newWorkerWaiting = reg.waiting;
            updateAlert.classList.add("show");
          }

          reg.addEventListener("updatefound", function () {
            const newWorker = reg.installing;
            if (!newWorker) return;

            newWorker.addEventListener("statechange", function () {
              if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                newWorkerWaiting = newWorker;
                updateAlert.classList.add("show");
              }
            });
          });
        } catch (err) {
          console.warn("Service Worker gagal didaftarkan:", err);
        }
      });

      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (refreshing) return;
        refreshing = true;
        location.reload();
      });
    }

    btnApplyUpdate.addEventListener("click", function () {
      if (!newWorkerWaiting) {
        location.reload();
        return;
      }
      newWorkerWaiting.postMessage({ type: "SKIP_WAITING" });
    });

    document.addEventListener("gesturestart", function (event) {
      event.preventDefault();
    });
  </script>
</body>
</html>
