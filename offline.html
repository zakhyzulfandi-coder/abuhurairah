<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f27a24" />
  <title>Offline - SISFO AHIS MTS</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(242, 122, 36, .14), transparent 34%),
        linear-gradient(180deg, #fff7ed 0%, #f8fafc 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
    }
    .card {
      width: min(430px, 94vw);
      padding: 28px;
      border-radius: 28px;
      background: rgba(255,255,255,.9);
      border: 1px solid #e2e8f0;
      box-shadow: 0 18px 45px rgba(15,23,42,.12);
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: linear-gradient(135deg, #f27a24, #ffb84d);
      font-size: 32px;
      font-weight: 900;
    }
    h1 { margin: 0; font-size: 1.35rem; font-weight: 900; }
    p { margin: 10px 0 20px; color: #64748b; line-height: 1.5; font-weight: 650; }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #f27a24;
      color: white;
      font-weight: 900;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">!</div>
    <h1>Koneksi Internet Tidak Tersedia</h1>
    <p>SISFO AHIS membutuhkan internet untuk membuka data dari Google Apps Script dan Spreadsheet.</p>
    <button type="button" onclick="location.reload()">Coba Muat Ulang</button>
  </main>
</body>
</html>
